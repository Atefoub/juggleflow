# Production-like stack (immutable images; no source mounts).
# Podman:
#   podman compose -f compose.prod.yml up -d
#
# Docker:
#   docker compose -f compose.prod.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-juggleflow_db}
      POSTGRES_USER: ${POSTGRES_USER:-juggleflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # Pas de port hôte : accès réseau Docker/Podman uniquement (sécurité prod).
    volumes:
      - juggleflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-juggleflow_user} -d ${POSTGRES_DB:-juggleflow_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # Pas de port hôte exposé (idem postgres).
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - juggleflow_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    image: juggleflow-backend:${BACKEND_IMAGE_TAG:-local}
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-juggleflow_db}
      POSTGRES_DB: ${POSTGRES_DB:-juggleflow_db}
      POSTGRES_USER: ${POSTGRES_USER:-juggleflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      APP_TRUSTED_PROXY: ${APP_TRUSTED_PROXY:-true}
      SWAGGER_ENABLED: "false"
      SWAGGER_PUBLIC: "false"
      DEMO_BOOTSTRAP_ENABLED: "false"
      ADMIN_BOOTSTRAP_EMAIL: ""
      ADMIN_BOOTSTRAP_PASSWORD: ""
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_JWT_REVOCATION_STORE: redis
      APP_RATE_LIMIT_STORE: redis
      APP_PUBLIC_REGISTRATION_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  juggleflow_pgdata:
  juggleflow_redisdata:

