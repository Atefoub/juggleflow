apiVersion: v1
kind: Service
metadata:
  name: juggleflow-redis
spec:
  selector:
    app: juggleflow-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juggleflow-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juggleflow-redis
  template:
    metadata:
      labels:
        app: juggleflow-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
              name: redis
          args: ["redis-server", "--appendonly", "yes"]
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli ping | grep -q PONG"]
            initialDelaySeconds: 20
            periodSeconds: 10

