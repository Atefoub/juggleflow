name: CI

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint/test/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx lint frontend

      - name: Test
        run: npx nx test frontend

      - name: Build
        run: npx nx build frontend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: juggleflow_db
          POSTGRES_USER: juggleflow_user
          POSTGRES_PASSWORD: juggleflow_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U juggleflow_user -d juggleflow_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Wait for Postgres and Redis
        run: |
          wait_for_port() {
            local port="$1" name="$2"
            for _ in $(seq 1 30); do
              if bash -c "echo > /dev/tcp/127.0.0.1/${port}" 2>/dev/null; then
                echo "${name} reachable on port ${port}"
                return 0
              fi
              sleep 2
            done
            echo "${name} not reachable on port ${port}"
            return 1
          }
          wait_for_port 5432 Postgres
          wait_for_port 6379 Redis

      - name: Start API with demo data
        working-directory: apps/backend
        env:
          POSTGRES_DB: juggleflow_db
          POSTGRES_USER: juggleflow_user
          POSTGRES_PASSWORD: juggleflow_dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/juggleflow_db
          JWT_SECRET: e2e-ci-jwt-secret-must-be-at-least-32-chars-long
          CORS_ALLOWED_ORIGINS: http://localhost:4200
          COOKIE_SECURE: "false"
          DEMO_BOOTSTRAP_ENABLED: "true"
          DEMO_BOOTSTRAP_PASSWORD: Demo2026!
          ADMIN_BOOTSTRAP_EMAIL: admin@juggleflow.local
          ADMIN_BOOTSTRAP_PASSWORD: Admin2026!
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          APP_JWT_REVOCATION_STORE: redis
          APP_RATE_LIMIT_STORE: redis
          APP_TRUSTED_PROXY: "true"
          # Chaque visite de /login appelle aussi /auth/refresh (compté dans le quota).
          APP_RATE_LIMIT_MAX_REQUESTS: "80"
        run: |
          chmod +x mvnw
          ./mvnw -q spring-boot:run > ../../backend-e2e.log 2>&1 &
          BACKEND_PID=$!
          for _ in $(seq 1 60); do
            if ! kill -0 "${BACKEND_PID}" 2>/dev/null; then
              echo "Backend process exited early"
              tail -n 120 ../../backend-e2e.log || true
              exit 1
            fi
            if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              if curl -sf -X POST http://localhost:8080/api/auth/login \
                -H 'Content-Type: application/json' \
                -d '{"email":"marie.dupont@ecole.fr","password":"Demo2026!"}' \
                | grep -q 'accessToken'; then
                echo "Backend ready (health + login OK)"
                exit 0
              fi
            fi
            sleep 5
          done
          echo "Backend failed to start in time"
          tail -n 120 ../../backend-e2e.log || true
          exit 1

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BACKEND_URL: http://localhost:8080
          E2E_RATE_LIMIT_PROBE_ATTEMPTS: "85"
          E2E_PASSWORD: Demo2026!
          E2E_TEACHER_EMAIL: marie.dupont@ecole.fr
          E2E_STUDENT_EMAIL: lucas.martin@ecole.fr
          E2E_ADMIN_EMAIL: admin@juggleflow.local
          E2E_ADMIN_PASSWORD: Admin2026!
        run: npm run e2e

      - name: Upload backend log on E2E failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-log
          path: backend-e2e.log
          retention-days: 3

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          retention-days: 7

  backend:
    name: Backend (test/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        working-directory: apps/backend
        run: ./mvnw -q test

      - name: Build jar
        working-directory: apps/backend
        run: ./mvnw -q clean package -DskipTests

