name: Secret Scan (TruffleHog)

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ghcr.io renvoie parfois 502 sur :latest — image versionnée + retries au pull
      - name: Prefetch TruffleHog Docker image
        run: |
          IMAGE="ghcr.io/trufflesecurity/trufflehog:v3.88.0"
          for attempt in 1 2 3 4; do
            if docker pull "$IMAGE"; then
              echo "Image pulled: $IMAGE"
              exit 0
            fi
            echo "Pull failed (attempt ${attempt}/4), retry in 25s…"
            sleep 25
          done
          echo "Could not pull TruffleHog image from ghcr.io"
          exit 1

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          head: ${{ github.sha }}
          extra_args: --only-verified
          dockerImage: ghcr.io/trufflesecurity/trufflehog:v3.88.0

