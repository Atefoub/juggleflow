name: Container scan

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-backend-image:
    name: Trivy (backend image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t juggleflow-backend:ci-scan -f apps/backend/Dockerfile apps/backend

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: juggleflow-backend:ci-scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
