name: Container scan

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-backend-image:
    name: Trivy (backend image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t juggleflow-backend:ci-scan -f apps/backend/Dockerfile apps/backend

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          image-ref: juggleflow-backend:ci-scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          # HIGH sur l'image JRE de base : suivi manuel ; CRITICAL bloque si réapparaît.
          severity: CRITICAL
