name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    - cron: '0 3 * * 1' # weekly

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin', 'javascript-typescript' ]

    steps:
      - uses: actions/checkout@v4

      - name: Init CodeQL (Java)
        if: matrix.language == 'java-kotlin'
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Init CodeQL (JavaScript/TypeScript)
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci

      - name: Build frontend (TypeScript)
        if: matrix.language == 'javascript-typescript'
        run: npx nx build frontend

      - name: Build backend (Maven)
        if: matrix.language == 'java-kotlin'
        working-directory: apps/backend
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      # Sur l'événement pull_request, l'upload SARIF peut échouer selon les permissions
      # ("Resource not accessible by integration"). On force donc upload=false sur PR,
      # et on garde l'upload sur push/schedule.
      - name: Perform CodeQL Analysis (upload on push/schedule)
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/analyze@v3

      - name: Perform CodeQL Analysis (no upload on PRs)
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/analyze@v3
        with:
          upload: false

