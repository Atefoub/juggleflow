name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    - cron: '0 3 * * 1' # weekly

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # Sur les PRs provenant de forks, GitHub peut refuser l'upload (Resource not accessible by integration).
    # On garde CodeQL sur push/schedule et sur PRs internes au repo.
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin', 'javascript-typescript' ]

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci

      - name: Build frontend (TypeScript)
        if: matrix.language == 'javascript-typescript'
        run: npx nx build frontend

      - name: Build backend (Maven)
        if: matrix.language == 'java-kotlin'
        working-directory: apps/backend
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

