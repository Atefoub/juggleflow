# ================================================================
#  JuggleFlow — Profil PRODUCTION
#
#  Objectif :
#  - supprimer les valeurs par défaut "dev" (secrets, toggles dangereux)
#  - forcer Redis pour révocation JWT + rate limiting en multi-instances
#  - désactiver les bootstraps demo/admin
# ================================================================

# JWT : pas de fallback en prod
jwt.secret=${JWT_SECRET}

# Cookies : HTTPS obligatoire
cookie.secure=true

# Swagger : désactivé en prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
swagger.public=false

# Bootstraps : jamais en prod
demo.bootstrap.enabled=false
admin.bootstrap.email=
admin.bootstrap.password=

# Stores distribués (multi-instances)
app.jwt.revocation.store=redis
app.rate-limit.store=redis

