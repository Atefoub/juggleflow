# ================================================================
#  JuggleFlow ? Configuration principale
#
#  Les variables marquïŋ―es [OBLIGATOIRE] n'ont pas de valeur par
#  dïŋ―faut : l'application refuse de dïŋ―marrer si elles sont absentes.
#
#  Convention de surcharge par variable d'environnement (Spring Boot) :
#  app.trusted-proxy=true  ?  APP_TRUSTED_PROXY=true
#  jwt.secret=xxx          ?  JWT_SECRET=xxx
#  etc.
#
#  Voir apps/backend/.env.example pour la liste complïŋ―te.
# ================================================================

spring.config.import=optional:file:.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME:JuggleFlow}
server.port=${SERVER_PORT:8080}

# -- Base de donnïŋ―es ----------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:juggleflow_db}
spring.datasource.username=${POSTGRES_USER:juggleflow_user}
# [OBLIGATOIRE] ? aucune valeur par dïŋ―faut intentionnellement
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=2
# Sïŋ―curitïŋ― : interdit le drop du schïŋ―ma en production
spring.flyway.clean-disabled=true

# -- Ressources pÃĐdagogiques (fichiers PDF) ------------------------------------
app.resources.storage-dir=${RESOURCES_STORAGE_DIR:uploads/resources}
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

# -- JWT ----------------------------------------------------------------------
# Dïŋ―faut : uniquement si JWT_SECRET n'est pas dïŋ―fini (ex. dev sans .env).
# Production / staging : dïŋ―finir JWT_SECRET (ex. openssl rand -base64 64).
jwt.secret=${JWT_SECRET:DevOnlyJwtSecretLocalMinimum32Characters2026!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- Cookies -------------------------------------------------------------------
# En production: laisser Ã  true (cookie refresh envoyÃĐ uniquement en HTTPS).
# En dÃĐveloppement local (http://localhost): dÃĐfinir COOKIE_SECURE=false.
cookie.secure=${COOKIE_SECURE:true}

# -- CORS ---------------------------------------------------------------------
# Dev : http://localhost:4200
# Prod : https://juggleflow.fr (ou domaine de l'ïŋ―tablissement)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# -- Reverse proxy et extraction d'IP ----------------------------------------
# [FIX-TRUSTEDPROXY] 04/05/2026 ? Cette propriïŋ―tïŋ― ïŋ―tait lue via System.getProperty()
# dans RateLimitFilter et GdprController, contournant la gestion Spring Boot.
# Elle est dïŋ―sormais dïŋ―clarïŋ―e ici et injectïŋ―e via @Value dans les deux composants.
#
# false (dïŋ―faut) : l'IP TCP (request.getRemoteAddr()) est toujours utilisïŋ―e.
#                  Correct pour un dïŋ―ploiement direct sans reverse-proxy.
# true           : la derniïŋ―re entrïŋ―e du header X-Forwarded-For est utilisïŋ―e.
#                  ïŋ― activer uniquement derriïŋ―re nginx / AWS ALB / Traefik.
#
# En prod Kubernetes, passer APP_TRUSTED_PROXY=true dans les variables d'env du Pod.
app.trusted-proxy=${APP_TRUSTED_PROXY:false}

# -- Swagger / OpenAPI --------------------------------------------------------
# Dïŋ―sactivïŋ― par dïŋ―faut. Activer uniquement en dïŋ―veloppement via variable d'env.
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# swagger.public=true  ? Swagger accessible sans auth (dev local uniquement)
# swagger.public=false ? Swagger protïŋ―gïŋ― par ROLE_ADMINISTRATEUR (prod)
swagger.public=${SWAGGER_PUBLIC:false}

# -- RGPD ---------------------------------------------------------------------
# Version courante de la politique de confidentialite. Un consentement enregistre
# avec une version anterieure est considere comme EXPIRED par GdprService :
# cela force une nouvelle saisie quand la politique evolue (ex. ajout de finalite).
gdpr.current-policy-version=${GDPR_CURRENT_POLICY_VERSION:2026-1}

# Duree de validite par defaut d'un consentement parental (en jours).
# Applique uniquement si la requete ne precise pas expiresAt. Convient pour
# couvrir une annee scolaire (rentree -> fin d'annee suivante).
gdpr.consent-default-validity-days=${GDPR_CONSENT_DEFAULT_VALIDITY_DAYS:400}

# -- Admin bootstrap (DEV UNIQUEMENT) -----------------------------------------
# [DEV-BOOTSTRAP-01] Cree un compte ROLE_ADMINISTRATEUR au demarrage si les deux
# variables sont definies. INACTIF par defaut (valeurs vides) pour rester sur :
#   - Spring Security verrouille /api/admin/** derriere ROLE_ADMINISTRATEUR
#   - POST /api/auth/register refuse les roles admin ([VULN-20] dans AuthService)
# Voir com.juggleflow.backend.bootstrap.AdminBootstrapRunner pour la logique
# (idempotent, valide la complexite du mot de passe, log WARN explicite a la creation).
# NE JAMAIS definir ces variables en production.
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}
admin.bootstrap.first-name=${ADMIN_BOOTSTRAP_FIRST_NAME:Admin}
admin.bootstrap.last-name=${ADMIN_BOOTSTRAP_LAST_NAME:Bootstrap}

# -- Actuator -----------------------------------------------------------------
# Seul /actuator/health est exposïŋ― (sonde K8s / Docker healthcheck).
# show-details=never : aucune information d'infrastructure dans la rïŋ―ponse.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
