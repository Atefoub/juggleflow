# ================================================================
#  JuggleFlow ? Configuration principale
# ================================================================

spring.application.name=${SPRING_APPLICATION_NAME:JuggleFlow}
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:juggleflow_db}
spring.datasource.username=${POSTGRES_USER:juggleflow_user}
spring.datasource.password=${POSTGRES_PASSWORD:JuggleFlow2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
# Flyway gere le DDL ? Hibernate ne fait que valider
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true permet � Flyway de s'initialiser sur une base
# existante (ex : base d�j� cr��e via init/juggleflow_postgresql_en.sql)
# sans rejouer V1 et V2. � d�sactiver sur une base vierge.
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=2
# S�curit� : interdit la suppression des objets en prod
spring.flyway.clean-disabled=true

# -- JWT ----------------------------------------------------------------------
jwt.secret=${JWT_SECRET:Y8f3kL9pQ2sT7vB1xW4zR6nM8cP0dS5hA3eF7gH9jK2mN4pQ6rT8vX0zB1cD3}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- CORS ---------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# -- Swagger ------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# -- Actuator -----------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

