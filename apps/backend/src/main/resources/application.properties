# ================================================================
#  JuggleFlow ? Configuration principale
#
#  Les variables marquï¿½es [OBLIGATOIRE] n'ont pas de valeur par
#  dï¿½faut : l'application refuse de dï¿½marrer si elles sont absentes.
#
#  Convention de surcharge par variable d'environnement (Spring Boot) :
#  app.trusted-proxy=true  ?  APP_TRUSTED_PROXY=true
#  jwt.secret=xxx          ?  JWT_SECRET=xxx
#  etc.
#
#  Voir apps/backend/.env.example pour la liste complï¿½te.
# ================================================================

spring.config.import=optional:file:.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME:JuggleFlow}
server.port=${SERVER_PORT:8080}

# -- Base de donnï¿½es ----------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:juggleflow_db}
spring.datasource.username=${POSTGRES_USER:juggleflow_user}
# [OBLIGATOIRE] ? aucune valeur par dï¿½faut intentionnellement
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=2
# Sï¿½curitï¿½ : interdit le drop du schï¿½ma en production
spring.flyway.clean-disabled=true

# -- JWT ----------------------------------------------------------------------
# [OBLIGATOIRE] ? gï¿½nï¿½rer avec : openssl rand -base64 64
# Aucune valeur par dï¿½faut : un secret manquant fait ï¿½chouer le dï¿½marrage.
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- CORS ---------------------------------------------------------------------
# Dev : http://localhost:4200
# Prod : https://juggleflow.fr (ou domaine de l'ï¿½tablissement)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# -- Reverse proxy et extraction d'IP ----------------------------------------
# [FIX-TRUSTEDPROXY] 04/05/2026 ? Cette propriï¿½tï¿½ ï¿½tait lue via System.getProperty()
# dans RateLimitFilter et GdprController, contournant la gestion Spring Boot.
# Elle est dï¿½sormais dï¿½clarï¿½e ici et injectï¿½e via @Value dans les deux composants.
#
# false (dï¿½faut) : l'IP TCP (request.getRemoteAddr()) est toujours utilisï¿½e.
#                  Correct pour un dï¿½ploiement direct sans reverse-proxy.
# true           : la derniï¿½re entrï¿½e du header X-Forwarded-For est utilisï¿½e.
#                  ï¿½ activer uniquement derriï¿½re nginx / AWS ALB / Traefik.
#
# En prod Kubernetes, passer APP_TRUSTED_PROXY=true dans les variables d'env du Pod.
app.trusted-proxy=${APP_TRUSTED_PROXY:false}

# -- Swagger / OpenAPI --------------------------------------------------------
# Dï¿½sactivï¿½ par dï¿½faut. Activer uniquement en dï¿½veloppement via variable d'env.
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# swagger.public=true  ? Swagger accessible sans auth (dev local uniquement)
# swagger.public=false ? Swagger protï¿½gï¿½ par ROLE_ADMINISTRATEUR (prod)
swagger.public=${SWAGGER_PUBLIC:false}

# -- Actuator -----------------------------------------------------------------
# Seul /actuator/health est exposï¿½ (sonde K8s / Docker healthcheck).
# show-details=never : aucune information d'infrastructure dans la rï¿½ponse.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
