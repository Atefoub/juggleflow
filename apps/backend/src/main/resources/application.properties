# ================================================================
#  JuggleFlow — Configuration principale
#
#  Les variables marquées [OBLIGATOIRE] n'ont pas de valeur par
#  défaut : l'application refuse de démarrer si elles sont absentes.
#
#  Convention de surcharge par variable d'environnement (Spring Boot) :
#  app.trusted-proxy=true  →  APP_TRUSTED_PROXY=true
#  jwt.secret=xxx          →  JWT_SECRET=xxx
#  etc.
#
#  Voir apps/backend/.env.example pour la liste complète.
# ================================================================

spring.config.import=optional:file:.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME:JuggleFlow}
server.port=${SERVER_PORT:8080}

# -- Base de données ----------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:juggleflow_db}
spring.datasource.username=${POSTGRES_USER:juggleflow_user}
# [OBLIGATOIRE] — aucune valeur par défaut intentionnellement
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=2
# Sécurité : interdit le drop du schéma en production
spring.flyway.clean-disabled=true

# -- Ressources pédagogiques (fichiers PDF) ------------------------------------
app.resources.storage-dir=${RESOURCES_STORAGE_DIR:uploads/resources}
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

# -- JWT ----------------------------------------------------------------------
# Défaut : uniquement si JWT_SECRET n'est pas défini (ex. dev sans .env).
# Production / staging : définir JWT_SECRET (ex. openssl rand -base64 64).
jwt.secret=${JWT_SECRET:DevOnlyJwtSecretLocalMinimum32Characters2026!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- Cookies -------------------------------------------------------------------
# En production: laisser à true (cookie refresh envoyé uniquement en HTTPS).
# En développement local (http://localhost): définir COOKIE_SECURE=false.
cookie.secure=${COOKIE_SECURE:true}

# -- CORS ---------------------------------------------------------------------
# Dev : http://localhost:4200
# Prod : https://juggleflow.fr (ou domaine de l'établissement)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# -- Reverse proxy et extraction d'IP ----------------------------------------
# false (défaut) : IP TCP (getRemoteAddr).
# true : dernière entrée X-Forwarded-For — uniquement derrière nginx / ALB / Traefik.
app.trusted-proxy=${APP_TRUSTED_PROXY:false}

# -- Redis (prod recommandé) ---------------------------------------------------
# Utilisé pour la révocation de tokens (blacklist JTI) et le rate limiting distribué.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# -- Token revocation store ----------------------------------------------------
# memory : simple Set en mémoire JVM (dev uniquement, perdu au redémarrage)
# redis  : clés TTL en Redis (prod / multi-instances)
app.jwt.revocation.store=${APP_JWT_REVOCATION_STORE:memory}

# -- Rate limiting store -------------------------------------------------------
# memory : Bucket4j en mémoire JVM (dev uniquement, contournable multi-instances)
# redis  : compteur Redis avec TTL (prod / multi-instances)
app.rate-limit.store=${APP_RATE_LIMIT_STORE:memory}
app.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:10}
app.rate-limit.window-seconds=${APP_RATE_LIMIT_WINDOW_SECONDS:60}

# -- Swagger / OpenAPI --------------------------------------------------------
# Désactivé par défaut. Activer uniquement en développement via variable d'env.
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# swagger.public=true  → Swagger accessible sans auth (dev local uniquement)
# swagger.public=false → Swagger protégé par ROLE_ADMINISTRATEUR (prod)
swagger.public=${SWAGGER_PUBLIC:false}

# -- RGPD ---------------------------------------------------------------------
# Version courante de la politique de confidentialité. Un consentement enregistré
# avec une version antérieure est considéré comme EXPIRED par GdprService.
gdpr.current-policy-version=${GDPR_CURRENT_POLICY_VERSION:2026-1}

# Durée de validité par défaut d'un consentement parental (en jours).
gdpr.consent-default-validity-days=${GDPR_CONSENT_DEFAULT_VALIDITY_DAYS:400}

# -- Admin bootstrap (DEV UNIQUEMENT) -----------------------------------------
# Crée un compte ROLE_ADMINISTRATEUR au démarrage si email + password sont définis.
# INACTIF par défaut. NE JAMAIS définir ces variables en production.
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}
admin.bootstrap.first-name=${ADMIN_BOOTSTRAP_FIRST_NAME:Admin}
admin.bootstrap.last-name=${ADMIN_BOOTSTRAP_LAST_NAME:Bootstrap}

# -- Demo bootstrap (DEV / soutenance uniquement) -----------------------------
demo.bootstrap.enabled=${DEMO_BOOTSTRAP_ENABLED:false}
demo.bootstrap.password=${DEMO_BOOTSTRAP_PASSWORD:}

# -- Actuator -----------------------------------------------------------------
# Seul /actuator/health est exposé (sonde K8s / Docker healthcheck).
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
