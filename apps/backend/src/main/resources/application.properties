# ================================================================
#  JuggleFlow — Configuration principale
# ================================================================

spring.application.name=${SPRING_APPLICATION_NAME:JuggleFlow}
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:juggleflow_db}
spring.datasource.username=${POSTGRES_USER:juggleflow_user}
spring.datasource.password=${POSTGRES_PASSWORD:JuggleFlow2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# -- JWT ----------------------------------------------------------------------
jwt.secret=${JWT_SECRET:Y8f3kL9pQ2sT7vB1xW4zR6nM8cP0dS5hA3eF7gH9jK2mN4pQ6rT8vX0zB1cD3}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- CORS ---------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# -- Swagger ------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# -- Actuator -----------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never