# ================================================================
#  JuggleFlow — Configuration principale
#  Les variables marquées [OBLIGATOIRE] n'ont pas de valeur par
#  défaut : l'application refuse de démarrer si elles sont absentes.
#  Voir apps/backend/.env.example pour la liste complète.
# ================================================================

spring.config.import=optional:file:.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME:JuggleFlow}
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:juggleflow_db}
spring.datasource.username=${POSTGRES_USER:juggleflow_user}
# [OBLIGATOIRE] — aucune valeur par défaut intentionnellement
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=false

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=2
spring.flyway.clean-disabled=true

# -- JWT ----------------------------------------------------------------------
# [OBLIGATOIRE] — générer avec : openssl rand -base64 64
# Aucune valeur par défaut : un secret manquant fait échouer le démarrage.
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- CORS ---------------------------------------------------------------------
# Exemple : http://localhost:4200 en dev, https://juggleflow.fr en prod
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# -- Swagger / OpenAPI --------------------------------------------------------
# Désactivé par défaut. Activer uniquement en développement via variable d'env
# ou profil Spring (SWAGGER_ENABLED=true).
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# -- Actuator -----------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
