# ================================================================
#  JuggleFlow ? Profil TEST
#  Cible : PostgreSQL réel (via variables d'environnement ou CI).
# ================================================================

spring.application.name=JuggleFlow
server.port=8080

# Base de données
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/juggleflow_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:juggleflow_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme_test}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ----------------------------------------------------------
# Hibernate 7 (Spring Boot 4) : le dialecte générique reste valide.
# Flyway gère le DDL ? Hibernate valide uniquement.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Sur la base de test, on part toujours d'une base vierge recréée avant
# chaque run : baseline-on-migrate=false garantit que V1 et V2 sont bien
# rejoués à chaque fois (teardown via les BeforeEach deleteAll).
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=false
# clean-on-validation-error=true : si le schéma diverge, Flyway nettoie
# et réapplique les migrations. Sécurisé car base de test isolée.
spring.flyway.clean-on-validation-error=true

# -- JWT ----------------------------------------------------------------------
jwt.secret=${JWT_SECRET:TestSecretKeyTresLongueMinimum32CaractersPourLesTests2026!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- CORS ---------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# -- Sécurité -----------------------------------------------------------------
spring.security.debug=false

# -- SpringDoc 3.x (Spring Boot 4 compatible) ---------------------------------
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.scalar.enabled=false
