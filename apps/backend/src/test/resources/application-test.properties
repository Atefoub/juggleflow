# ================================================================
#  JuggleFlow � Profil TEST
#
#  Objectif : tests auto-suffisants.
#  On utilise Testcontainers PostgreSQL via l'URL JDBC "jdbc:tc:" :
#  aucune base locale n'est requise, une DB jetable est lanc?e ? la vol?e.
# ================================================================

spring.application.name=JuggleFlow
server.port=8080

# Base de donn?es (Testcontainers)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:tc:postgresql:16:///juggleflow_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:test}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:test}
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# -- JPA / Hibernate ----------------------------------------------------------
# Hibernate 7 (Spring Boot 4) : le dialecte g�n�rique reste valide.
# Flyway g�re le DDL ? Hibernate valide uniquement.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# -- Flyway -------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Sur la base de test, on part toujours d'une base vierge recr��e avant
# chaque run : baseline-on-migrate=false garantit que V1 et V2 sont bien
# rejou�s � chaque fois (teardown via les BeforeEach deleteAll).
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=false
# clean-on-validation-error=true : si le sch�ma diverge, Flyway nettoie
# et r�applique les migrations. S�curis� car base de test isol�e.
spring.flyway.clean-on-validation-error=true

# -- Ressources (tests) ---------------------------------------------------------
app.resources.storage-dir=${java.io.tmpdir}/juggleflow-test-resources

# -- JWT ----------------------------------------------------------------------
jwt.secret=${JWT_SECRET:TestSecretKeyTresLongueMinimum32CaractersPourLesTests2026!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# -- CORS ---------------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Rate limiting : d?sactiv? en tests (les suites MockMvc encha?nent rapidement
# login/register et se font bloquer sinon).
app.rate-limit.enabled=false

# Jeu de d?mo : toujours d?sactiv? en tests (seed multi-comptes incompatible
# avec les tests de quota licence et pollue register).
demo.bootstrap.enabled=false

# -- S�curit� -----------------------------------------------------------------
spring.security.debug=false

# -- SpringDoc 3.x (Spring Boot 4 compatible) ---------------------------------
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.scalar.enabled=false
