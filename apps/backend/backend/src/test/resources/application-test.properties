# ================================================================
#  JuggleFlow - Profil TEST
#  Cible : PostgreSQL reel (via variables d'environnement ou valeurs par defaut CI).
# ================================================================

spring.application.name=JuggleFlow
server.port=8080

# Base de donnees
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/juggleflow_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:juggleflow_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme_test}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
#
# FIX : Spring Boot 4 embarque Hibernate 7 qui a supprime les dialectes
# specifiques par version (PostgreSQLDialect, PostgreSQL95Dialect, etc.).
# Le dialecte generique org.hibernate.dialect.PostgreSQLDialect reste valide
# mais la propriete recommandee avec Hibernate 7 est de laisser
# l'auto-detection faire son travail (spring.jpa.database-platform peut
# etre omis si le driver JDBC est correctement configure).
# On le conserve ici pour la clarte, mais en utilisant le nom canonique.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# JWT
# Cles alignees sur ce que JwtUtils attend via @Value :
#   ${jwt.secret}, ${jwt.expiration-ms}, ${jwt.refresh-expiration-ms}
jwt.secret=${JWT_SECRET:TestSecretKeyTresLongueMinimum32CaractersPourLesTests2026!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Securite
spring.security.debug=false

# ================================================================
#  SPRINGDOC 3.x (Spring Boot 4 compatible)
#  springdoc 3.x desactive Swagger UI et active Scalar UI par defaut.
#  Les lignes ci-dessous restaurent le comportement habituel pour les tests.
# ================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.scalar.enabled=false