# JuggleFlow - Local Configuration
spring.application.name=JuggleFlow
server.port=8080

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# JWT Configuration
juggleflow.jwt.secret=${JWT_SECRET}
juggleflow.jwt.expiration=${JWT_EXPIRATION_MS}
juggleflow.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION_MS}

# H2 Console for testing
spring.h2.console.enabled=true

# Security
spring.security.debug=false