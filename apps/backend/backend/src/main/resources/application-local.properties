spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Les variables suivantes doivent être définies dans .env ou
# dans la configuration de lancement IntelliJ / IDE :
#
#   SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/juggleflow_db
#   SPRING_DATASOURCE_USERNAME=juggleflow_user
#   SPRING_DATASOURCE_PASSWORD=<votre_mot_de_passe>
#   JWT_SECRET=<clé_aléatoire_256bits>
#   JWT_EXPIRATION_MS=900000
#   JWT_REFRESH_EXPIRATION_MS=604800000
#   CORS_ALLOWED_ORIGINS=http://localhost:5173