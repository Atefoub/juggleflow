apiVersion: v1
kind: Pod
metadata:
  labels:
    app: juggleflow
  name: juggleflow
spec:
  containers:
    - name: juggleflow-db
      image: docker.io/library/postgres:17-alpine
      args:
        - postgres
      env:
        - name: POSTGRES_DB
          value: juggleflow_db
        - name: POSTGRES_USER
          value: juggleflow_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: juggleflow-db-password
              key: juggleflow-db-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
      ports:
        - containerPort: 5432
          hostPort: 5432
      volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: juggleflow-pgdata-pvc
        # Le volume juggleflow-init-sql a été supprimé :
        # Flyway (backend) prend en charge l'initialisation du schéma.
        # Plus besoin de monter init/juggleflow_postgresql_en.sql dans
        # /docker-entrypoint-initdb.d — ce répertoire est exécuté
        # uniquement sur base vierge et entrerait en conflit avec Flyway.

  restartPolicy: Always

  volumes:
    - name: juggleflow-pgdata-pvc
      persistentVolumeClaim:
        claimName: juggleflow-pgdata
